apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-app-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nest-app-test

  template:
    metadata:
      labels:
        app: nest-app-test

    spec:
      containers:
        - name: nest-app-test
          image: ebrizha/nest-app-test:IMAGE_TAG
          ports:
            - containerPort: 3000

          envFrom:
            - secretRef:
                name: postgres-secret

          env:
            - name: NODE_ENV
              value: production

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
